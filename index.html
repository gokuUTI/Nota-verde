<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTA VERDE - DEFENSE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        canvas { 
            display: block; 
            image-rendering: pixelated; 
            margin: 0 auto; 
            transition: filter 0.5s ease; 
        }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: url('1000087017.jpg') no-repeat center center; background-size: cover; z-index: 10;
        }
        
        .overlay-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .menu-content { position: relative; z-index: 11; text-align: center; width: 100%; }

        h1 { color: #ccff33; text-shadow: 3px 3px #000; font-size: clamp(32px, 8vw, 64px); margin-bottom: 30px; }

        .menu-btn {
            background: rgba(27, 27, 46, 0.9); border: 3px solid #ccff33; padding: 14px 30px;
            margin: 8px auto; font-size: 18px; cursor: pointer; width: 280px;
            color: #ccff33; font-weight: bold; display: block; font-family: 'Courier New', monospace;
        }
        
        .back-btn {
            background: #ff4444; border: 2px solid #fff; color: white; padding: 8px 15px; 
            cursor: pointer; position: absolute; top: 20px; left: 20px; z-index: 100; display: none;
        }

        #hud {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            color: #ccff33; font-size: 16px; display: none; text-shadow: 2px 2px #000;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; z-index: 5;
            text-align: center; border: 1px solid #ccff33;
        }

        #victory-screen, #game-over-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 40px; text-align: center; display: none; z-index: 20; border: 5px solid #fff;
        }
        #victory-screen { background: rgba(0, 100, 0, 0.9); border-color: #ccff33; color: #fff; }
        #game-over-screen { background: rgba(100, 0, 0, 0.9); border-color: #ff0000; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<button id="global-back-btn" class="back-btn" onclick="goBack()">◀ VOLVER</button>

<div id="ui-overlay">
    <div class="overlay-mask"></div>
    <div class="menu-content" id="main-menu">
        <h1>🌿 NOTA VERDE</h1>
        <div class="menu-btn" onclick="showWorldSelect()">▶ INICIAR DEFENSA</div>
    </div>
    
    <div class="menu-content hidden" id="world-select">
        <h2 style="color:#fff; margin-bottom:20px;">ELIGE TU MISIÓN</h2>
        <div class="menu-btn" onclick="loadWorld('Aire')">☁ MUNDO AIRE</div>
        <div class="menu-btn" onclick="loadWorld('Agua')">🌊 MUNDO AGUA</div>
        <div class="menu-btn" onclick="loadWorld('Tierra')">🌳 MUNDO TIERRA</div>
    </div>
</div>

<div id="hud">
    MUNDO: <span id="world-name">—</span><br>
    ❤ SALUD CORAZÓN: <span id="heart-hp">100</span>% | 💀 PURIFICADOS: <span id="kill-count">0</span>/50
</div>

<div id="victory-screen">
    <h2 style="font-size: 40px; margin-bottom: 20px;">✨ ¡MUNDO SALVADO! ✨</h2>
    <button class="menu-btn" onclick="location.reload()">MENU PRINCIPAL</button>
</div>

<div id="game-over-screen">
    <h2 style="font-size: 40px; margin-bottom: 20px;">💀 CORAZÓN MARCHITO</h2>
    <p>La contaminación ha ganado esta vez...</p>
    <button class="menu-btn" onclick="location.reload()">REINTENTAR</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Carga de imágenes
const bgImages = { 'Aire': new Image(), 'Agua': new Image(), 'Tierra': new Image() };
bgImages['Aire'].src = '1000087019.jpg';
bgImages['Agua'].src = '1000087020.jpg';
bgImages['Tierra'].src = '1000087017.jpg';

// NUEVO: Carga de la imagen del corazón pixel art
const heartImage = new Image();
heartImage.src = 'corazon_pixel.png'; // Asegúrate de que el archivo se llame así en tu carpeta

function resize() {
    const ratio = 16/9;
    let w = window.innerWidth, h = window.innerHeight;
    if (w / h > ratio) w = h * ratio; else h = w / ratio;
    canvas.width = 800; canvas.height = 450;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}
window.addEventListener('resize', resize);
resize();

let gameState = 'MENU';
let currentWorld = '';
let kills = 0;
let heartHP = 100;
let enemies = [];
let keys = {};

// ACTUALIZACIÓN: Radio del jugador bajado a 25 (más difícil)
const player = { x: 100, y: 100, speed: 5, radius: 25 };
const heart = { x: 400, y: 225 };

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function showWorldSelect() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('world-select').classList.remove('hidden');
    document.getElementById('global-back-btn').style.display = 'block';
}

function goBack() { location.reload(); }

function loadWorld(type) {
    currentWorld = type;
    gameState = 'PLAYING';
    document.getElementById('ui-overlay').classList.add('hidden');
    document.getElementById('hud').style.display = 'block';
    document.getElementById('world-name').textContent = type;
}

function spawnEnemy() {
    if (gameState !== 'PLAYING' || enemies.length > 12) return;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0) { x = Math.random() * 800; y = -20; }
    else if (side === 1) { x = 820; y = Math.random() * 450; }
    else if (side === 2) { x = Math.random() * 800; y = 470; }
    else { x = -20; y = Math.random() * 450; }
    enemies.push({ x, y, speed: 1.2 + Math.random() });
}
setInterval(spawnEnemy, 1000);

function update() {
    if (gameState !== 'PLAYING') return;

    if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    player.x = Math.max(0, Math.min(800, player.x));
    player.y = Math.max(0, Math.min(450, player.y));

    if (heartHP > 70) {
        canvas.style.filter = "saturate(1) brightness(1)";
    } else if (heartHP > 30) {
        canvas.style.filter = "saturate(0.4) brightness(0.7) sepia(0.3)";
    } else {
        canvas.style.filter = "grayscale(1) brightness(0.4)";
    }

    enemies.forEach((en, index) => {
        const dx = heart.x - en.x;
        const dy = heart.y - en.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        en.x += (dx / dist) * en.speed;
        en.y += (dy / dist) * en.speed;

        // Ataque al corazón (con el nuevo tamaño de la imagen)
        if (dist < 40) { // Radio de colisión un poco más grande para la imagen
            heartHP -= 0.15;
            document.getElementById('heart-hp').textContent = Math.max(0, Math.ceil(heartHP));
            if (heartHP <= 0) {
                gameState = 'GAMEOVER';
                document.getElementById('game-over-screen').style.display = 'block';
                canvas.style.filter = "grayscale(1) blur(2px)";
            }
        }

        const pdx = player.x - en.x;
        const pdy = player.y - en.y;
        const pDist = Math.sqrt(pdx*pdx + pdy*pdy);
        
        if (pDist < player.radius) {
            enemies.splice(index, 1);
            kills++;
            document.getElementById('kill-count').textContent = kills;
            if (kills >= 50) {
                gameState = 'VICTORY';
                document.getElementById('victory-screen').style.display = 'block';
                canvas.style.filter = "saturate(1.5) brightness(1.1)";
            }
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, 800, 450);
    if (gameState === 'PLAYING' || gameState === 'VICTORY' || gameState === 'GAMEOVER') {
        ctx.drawImage(bgImages[currentWorld], 0, 0, 800, 450);

        // ACTUALIZACIÓN: Dibujar el Corazón Pixel Art
        // El corazón sigue pulsando, pero ahora dibujando la imagen
        const pulse = Math.sin(Date.now() / 200) * 5;
        
        // Base size 60, escalado por vida (0.5 a 1.0) más el pulso
        let currentHeartSize = (60 * (0.5 + (heartHP / 200))) + pulse;
        
        // Si la imagen está cargada, la dibujamos centrada
        if (heartImage.complete) {
            ctx.drawImage(
                heartImage,
                heart.x - currentHeartSize / 2, // Centrado en X
                heart.y - currentHeartSize / 2, // Centrado en Y
                currentHeartSize,               // Ancho
                currentHeartSize                // Alto
            );
        } else {
            // Fallback por si no carga la imagen (el círculo de antes)
            ctx.fillStyle = heartHP > 30 ? '#ff0044' : '#551111';
            ctx.beginPath();
            ctx.arc(heart.x, heart.y, 20 + (heartHP / 5) + pulse, 0, Math.PI * 2);
            ctx.fill();
        }

        // Jugador y Aura (el radio es ahora más pequeño)
        ctx.strokeStyle = 'rgba(204, 255, 51, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = '#ccff33';
        ctx.fillRect(player.x - 15, player.y - 15, 30, 30);

        // Enemigos
        ctx.fillStyle = '#ff0000';
        enemies.forEach(en => {
            ctx.fillRect(en.x - 10, en.y - 10, 20, 20);
        });
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
